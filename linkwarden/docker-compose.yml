configs:
  tailscale-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:3000"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    restart: always
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    network_mode: service:tailscale-linkwarden
    depends_on:
      tailscale-linkwarden:
        condition: service_healthy
  linkwarden:
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@127.0.0.1:5432/postgres
    restart: always
    # build: . # uncomment to build from source
    image: ghcr.io/linkwarden/linkwarden:latest # comment to build from source
    #ports:
    #  - 3000:3000
    volumes:
      - ./data:/data/data
    network_mode: service:tailscale-linkwarden
    depends_on:
      postgres:
        condition: service_started
      meilisearch:
        condition: service_started
      tailscale-linkwarden:
        condition: service_healthy
  meilisearch:
    image: getmeili/meilisearch:v1.12.8
    restart: always
    env_file:
      - .env
    volumes:
      - ./meili_data:/meili_data
    network_mode: service:tailscale-linkwarden
    depends_on:
      tailscale-linkwarden:
        condition: service_healthy
  tailscale-linkwarden:
    image: tailscale/tailscale:latest
    container_name: tailscale-linkwarden
    hostname: linkwarden
    environment:
      - TS_AUTHKEY=<REPLACE_WITH_YOUR_GENERATED_OAUTH_CLIENT>?ephemeral=false
      - "TS_EXTRA_ARGS=--advertise-tags=tag:<REPLACE_WITH_YOUR_TAG_NAME> --reset"
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
      - TS_ACCEPT_DNS=false
    configs:
      - source: tailscale-serve
        target: /config/serve.json
    volumes:
      - ${PWD}/tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: always
    healthcheck:
      test: >
        sh -c "
          wget --spider -q http://127.0.0.1:41234/healthz &&
          if [ ! -f /tmp/.dns-enabled ]; then
            tailscale set --accept-dns=true &&
            touch /tmp/.dns-enabled
          fi
        "
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    dns:
      - 9.9.9.9

